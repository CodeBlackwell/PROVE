<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ name }} — ShowMeOff</title>
  <link rel="stylesheet" href="/static/style.css?v=9">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bamboo" style="left:3%"></div>
  <div class="bamboo b2" style="left:5.5%"></div>
  <div class="bamboo b3" style="left:1.5%"></div>
  <header><h1>{{ name }}</h1></header>

  <main>
    <section id="chat-panel">
      <div id="messages"></div>
      <form id="chat-form">
        <input type="text" id="chat-input" placeholder="Ask about skills, experience, code…" autocomplete="off">
      </form>
    </section>

    <section id="graph-panel">
      <div class="viz-toggle">
        <button class="viz-toggle__btn viz-toggle__btn--active" data-mode="treemap">Treemap</button>
        <button class="viz-toggle__btn" data-mode="bars">Bars</button>
      </div>
      <div id="graph-container"></div>
      <p class="graph-empty">Graph builds as you chat…</p>
      <div class="legend" id="viz-legend"></div>
    </section>
  </main>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="/static/fingerprint.js?v=9"></script>
  <script src="/static/graph.js?v=9"></script>
  <script src="/static/chat.js?v=9"></script>
</body>
</html>
